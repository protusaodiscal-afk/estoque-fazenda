<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nelcir - Gestão de Insumos Agrícolas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f6f8;
      color: #2c3e50;
      padding: 20px;
    }
    header {
      background: #1b5e20;
      color: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    header h1 { font-size: 1.6rem; }
    .panic-btn {
      background: #d32f2f;
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.2s;
    }
    .panic-btn:hover { background: #b71c1c; }
    section {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    h2 { color: #1b5e20; margin-bottom: 15px; }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }
    .card {
      background: #e8f5e9;
      border-left: 5px solid #1b5e20;
      padding: 15px;
      border-radius: 6px;
    }
    .card h3 { font-size: 0.9rem; color: #555; margin-bottom: 5px; }
    .card p { font-size: 1.8rem; font-weight: bold; color: #1b5e20; }
    .search-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    input[type="text"], select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      flex: 1;
      min-width: 200px;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    .btn-primary { background: #1b5e20; color: #fff; }
    .btn-secondary { background: #1565c0; color: #fff; }
    .btn-danger { background: #c62828; color: #fff; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th { background: #1b5e20; color: #fff; }
    tr:hover { background: #f1f8e9; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
    .status-ok { background: #c8e6c9; color: #1b5e20; }
    .status-low { background: #fff9c4; color: #f57f17; }
    .status-out { background: #ffcdd2; color: #b71c1c; }
    #resultArea { margin-top: 15px; }
    .result-item {
      background: #f9f9f9;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .loading { color: #1565c0; font-style: italic; }
    .error { color: #b71c1c; font-weight: bold; }
    .success { color: #1b5e20; font-weight: bold; }
    @media (max-width: 600px) {
      header h1 { font-size: 1.2rem; }
      .card p { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌱 Nelcir - Gestão de Insumos Agrícolas</h1>
    <a class="panic-btn" href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" rel="noopener noreferrer">
      🚨 Liberar Proxy CORS
    </a>
  </header>

  <!-- DASHBOARD -->
  <section id="dashboard">
    <h2>📊 Dashboard</h2>
    <div class="dashboard">
      <div class="card"><h3>Total de Insumos</h3><p id="totalInsumos">0</p></div>
      <div class="card"><h3>Em Estoque</h3><p id="totalEstoque">0</p></div>
      <div class="card"><h3>Estoque Baixo</h3><p id="totalBaixo">0</p></div>
      <div class="card"><h3>Esgotados</h3><p id="totalEsgotado">0</p></div>
    </div>
  </section>

  <!-- BUSCA EMBRAPA -->
  <section id="buscaEmbrapa">
    <h2>🔍 Busca Embrapa</h2>
    <div class="search-form">
      <input type="text" id="termoBusca" placeholder="Digite o nome do produto ou ingrediente..." />
      <select id="tipoBusca">
        <option value="produto">Produto</option>
        <option value="ingrediente">Ingrediente Ativo</option>
        <option value="registro">Número de Registro</option>
      </select>
      <button class="btn-primary" onclick="buscarEmbrapa()">Buscar</button>
    </div>
    <div id="resultArea"></div>
  </section>

  <!-- TABELA DE ESTOQUE -->
  <section id="tabelaEstoque">
    <h2>📦 Estoque de Insumos</h2>
    <div class="search-form">
      <input type="text" id="filtroEstoque" placeholder="Filtrar estoque..." oninput="renderTabelaEstoque()" />
      <button class="btn-secondary" onclick="carregarEstoque()">Atualizar</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Ingrediente Ativo</th>
          <th>Nº Registro</th>
          <th>Quantidade</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="estoqueBody"></tbody>
    </table>
  </section>

  <script>
    // ===== CREDENCIAIS FIXAS =====
    const SUPABASE_URL = 'https://fzckjvvdqtyvunwxrbyl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2tqdnZkcXR5dnVud3hyYnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjgxOTgsImV4cCI6MjA5OTAwNDE5OH0.TxS0GJF0egBbkYHvRQN1Kzvid2ysSneG75jJ3RiwXaM';
    const EMBRAPA_TOKEN = '9c9499c1-7595-3271-a8f1-3f4c4cb4aee8';
    const CORS_PREFIX = 'https://cors-anywhere.herokuapp.com/';
    const EMBRAPA_BASE = CORS_PREFIX + 'https://api.cnpatos.embrapa.br/agrofit/apis/v1/produtos';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let estoqueCache = [];

    // ===== UTILITÁRIOS DE MAPEAMENTO =====
    function extrairCampo(item, campos) {
      if (!item) return '';
      for (const c of campos) {
        if (item[c] !== undefined && item[c] !== null && String(item[c]).trim() !== '') {
          return String(item[c]).trim();
        }
      }
      return '';
    }

    function extrairNome(item) {
      return extrairCampo(item, ['marcaComercial', 'nomeProduto', 'nomeComercial', 'nome']);
    }

    function extrairIngrediente(item) {
      return extrairCampo(item, ['ingredienteAtivo', 'ingrediente_ativo', 'nomeTecnico', 'ingrediente', 'nome']);
    }

    function extrairRegistro(item) {
      return extrairCampo(item, ['numeroRegistro', 'numero_registro', 'registro', 'nroRegistro', 'numRegistro']);
    }

    // ===== DASHBOARD =====
    async function carregarDashboard() {
      try {
        const { data, error } = await supabaseClient.from('insumos').select('*');
        if (error) throw error;
        estoqueCache = data || [];
        const total = estoqueCache.length;
        const emEstoque = estoqueCache.filter(i => (i.quantidade || 0) > 5).length;
        const baixo = estoqueCache.filter(i => (i.quantidade || 0) > 0 && (i.quantidade || 0) <= 5).length;
        const esgotado = estoqueCache.filter(i => !i.quantidade || i.quantidade === 0).length;
        document.getElementById('totalInsumos').textContent = total;
        document.getElementById('totalEstoque').textContent = emEstoque;
        document.getElementById('totalBaixo').textContent = baixo;
        document.getElementById('totalEsgotado').textContent = esgotado;
      } catch (err) {
        console.error('Erro ao carregar dashboard:', err);
      }
    }

    // ===== BUSCA EMBRAPA =====
    async function buscarEmbrapa() {
      const termo = document.getElementById('termoBusca').value.trim();
      const tipo = document.getElementById('tipoBusca').value;
      const resultArea = document.getElementById('resultArea');

      if (!termo) {
        resultArea.innerHTML = '<p class="error">Digite um termo para buscar.</p>';
        return;
      }

      resultArea.innerHTML = '<p class="loading">Buscando na Embrapa...</p>';

      try {
        const params = new URLSearchParams();
        params.append('token', EMBRAPA_TOKEN);
        if (tipo === 'produto') params.append('nomeProduto', termo);
        else if (tipo === 'ingrediente') params.append('ingredienteAtivo', termo);
        else if (tipo === 'registro') params.append('numeroRegistro', termo);

        const url = EMBRAPA_BASE + '?' + params.toString();
        const resp = await fetch(url, {
          headers: { 'Accept': 'application/json' }
        });

        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const json = await resp.json();
        const lista = json.data || json.produtos || json.resultado || json || [];
        const itens = Array.isArray(lista) ? lista : [lista];

        if (itens.length === 0) {
          resultArea.innerHTML = '<p class="error">Nenhum resultado encontrado.</p>';
          return;
        }

        resultArea.innerHTML = '';
        itens.forEach(item => {
          const nome = extrairNome(item) || 'Sem Nome';
          const ingrediente = extrairIngrediente(item) || 'Não informado';
          const registro = extrairRegistro(item) || 'Sem registro';

          const div = document.createElement('div');
          div.className = 'result-item';
          div.innerHTML = `
            <div>
              <strong>${escapeHtml(nome)}</strong><br/>
              <small>Ingrediente: ${escapeHtml(ingrediente)} | Registro: ${escapeHtml(registro)}</small>
            </div>
            <button class="btn-secondary" onclick="salvarInsumo('${escapeAttr(nome)}','${escapeAttr(ingrediente)}','${escapeAttr(registro)}')">
              + Adicionar ao Estoque
            </button>
          `;
          resultArea.appendChild(div);
        });
      } catch (err) {
        resultArea.innerHTML = '<p class="error">Erro na busca: ' + escapeHtml(err.message) + '. Verifique se o Proxy CORS está liberado (botão no topo).</p>';
      }
    }

    // ===== SALVAR NO BANCO =====
    async function salvarInsumo(nome, ingrediente, registro) {
      try {
        const { data, error } = await supabaseClient
          .from('insumos')
          .insert([{
            nome: nome || 'Sem Nome',
            ingrediente_ativo: ingrediente || '',
            numero_registro: registro || ''
          }]);
        if (error) throw error;
        alert('Insumo adicionado ao estoque!');
        await carregarEstoque();
      } catch (err) {
        alert('Erro ao salvar: ' + err.message);
      }
    }

    // ===== TABELA DE ESTOQUE =====
    async function carregarEstoque() {
      try {
        const { data, error } = await supabaseClient.from('insumos').select('*').order('nome', { ascending: true });
        if (error) throw error;
        estoqueCache = data || [];
        await carregarDashboard();
        renderTabelaEstoque();
      } catch (err) {
        document.getElementById('estoqueBody').innerHTML = '<tr><td colspan="6" class="error">Erro ao carregar estoque: ' + escapeHtml(err.message) + '</td></tr>';
      }
    }

    function renderTabelaEstoque() {
      const filtro = document.getElementById('filtroEstoque').value.toLowerCase();
      const tbody = document.getElementById('estoqueBody');
      const filtrados = estoqueCache.filter(i => {
        const nome = (i.nome || '').toLowerCase();
        const ing = (i.ingrediente_ativo || '').toLowerCase();
        const reg = (i.numero_registro || '').toLowerCase();
        return nome.includes(filtro) || ing.includes(filtro) || reg.includes(filtro);
      });

      if (filtrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Nenhum insumo cadastrado.</td></tr>';
        return;
      }

      tbody.innerHTML = '';
      filtrados.forEach(i => {
        const qtd = i.quantidade || 0;
        let statusClass = 'status-ok', statusText = 'Em estoque';
        if (qtd === 0) { statusClass = 'status-out'; statusText = 'Esgotado'; }
        else if (qtd <= 5) { statusClass = 'status-low'; statusText = 'Estoque baixo'; }

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(i.nome || 'Sem Nome')}</td>
          <td>${escapeHtml(i.ingrediente_ativo || '-')}</td>
          <td>${escapeHtml(i.numero_registro || '-')}</td>
          <td>${qtd}</td>
          <td><span class="status ${statusClass}">${statusText}</span></td>
          <td>
            <button class="btn-secondary" onclick="atualizarQuantidade(${i.id}, ${qtd}, 1)">+1</button>
            <button class="btn-danger" onclick="atualizarQuantidade(${i.id}, ${qtd}, -1)">-1</button>
            <button class="btn-danger" onclick="removerInsumo(${i.id})">🗑</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function atualizarQuantidade(id, qtdAtual, delta) {
      const novaQtd = Math.max(0, qtdAtual + delta);
      try {
        const { error } = await supabaseClient.from('insumos').update({ quantidade: novaQtd }).eq('id', id);
        if (error) throw error;
        await carregarEstoque();
      } catch (err) {
        alert('Erro ao atualizar: ' + err.message);
      }
    }

    async function removerInsumo(id) {
      if (!confirm('Remover este insumo do estoque?')) return;
      try {
        const { error } = await supabaseClient.from('insumos').delete().eq('id', id);
        if (error) throw error;
        await carregarEstoque();
      } catch (err) {
        alert('Erro ao remover: ' + err.message);
      }
    }

    // ===== HELPERS HTML =====
    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(str) {
      return String(str || '').replace(/'/g, "\\'").replace(/\\/g, "\\\\");
    }

    // ===== INIT =====
    window.addEventListener('DOMContentLoaded', () => {
      carregarEstoque();
    });
  </script>
</body>
</html>
