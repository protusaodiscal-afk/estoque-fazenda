<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nelcir - Busca de Insumos Embrapa</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f4f6f8;
      color: #222;
      padding: 20px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { color: #2e7d32; margin-bottom: 16px; }
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .search-bar button {
      padding: 10px 18px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .search-bar button:hover { background: #1b5e20; }
    .search-bar button:disabled { background: #9e9e9e; cursor: not-allowed; }
    #status { margin-bottom: 12px; font-size: 13px; color: #555; }
    #results { display: flex; flex-direction: column; gap: 10px; }
    .result-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .result-info { flex: 1; }
    .result-info .title { font-weight: 600; color: #333; margin-bottom: 4px; }
    .result-info .meta { font-size: 12px; color: #666; }
    .result-info .meta span { margin-right: 12px; }
    .btn-add {
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .btn-add:hover { background: #0d47a1; }
    .btn-add:disabled { background: #90caf9; cursor: not-allowed; }
    .btn-add.success { background: #2e7d32; }
    .btn-add.fail { background: #c62828; }
    #log {
      margin-top: 24px;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 14px;
      border-radius: 8px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .log-info { color: #6db33f; }
    .log-ok { color: #4fc3f7; }
    .log-err { color: #ff5252; }
    .log-warn { color: #ffb300; }
    .empty { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nelcir - Busca de Insumos (Embrapa)</h1>

    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Digite a marca comercial (ex: Decision)" />
      <button id="searchBtn" onclick="buscarProdutos()">Buscar</button>
    </div>

    <div id="status">Pronto para buscar.</div>

    <div id="results">
      <div class="empty">Nenhum resultado ainda.</div>
    </div>

    <div id="log" aria-live="polite"></div>
  </div>

  <script>
    // ===== Credenciais Fixas =====
    const SUPABASE_URL = 'https://fzckjvvdqtyvunwxrbyl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2tqdnZkcXR5dnVud3hyYnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjgxOTgsImV4cCI6MjA5OTAwNDE5OH0.TxS0GJF0egBbkYHvRQN1Kzvid2ysSneG75jJ3RiwXaM';
    const EMBRAPA_TOKEN = '9c9499c1-7595-3271-a8f1-3f4c4cb4aee8';
    const EMBRAPA_BASE = 'https://api.cnptia.embrapa.br/agrofit/v1/produtos-formulados';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== Log =====
    const logEl = document.getElementById('log');
    function log(type, msg) {
      const now = new Date().toLocaleString('pt-BR');
      const line = document.createElement('div');
      line.className = 'log-' + type;
      line.textContent = `[${now}] [${type.toUpperCase()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    log('info', 'Nelcir inicializado. Aguardando busca...');

    // ===== Helpers de mapeamento =====
    function getCampo(obj, nomes) {
      if (!obj) return '';
      for (const n of nomes) {
        if (obj[n] !== undefined && obj[n] !== null && String(obj[n]).trim() !== '') {
          return String(obj[n]).trim();
        }
      }
      return '';
    }

    function mapearProduto(item) {
      return {
        marca_comercial: getCampo(item, ['marcaComercial', 'marca_comercial', 'nomeComercial', 'nome']),
        ingrediente_ativo: getCampo(item, ['ingredienteAtivo', 'ingrediente_ativo', 'ingredienteAtivoPrincipal', 'principioAtivo']),
        numero_registro: getCampo(item, ['numeroRegistro', 'numero_registro', 'registro', 'numeroRegistroMapa'])
      };
    }

    // ===== Busca =====
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buscarProdutos();
    });

    async function buscarProdutos() {
      const termo = searchInput.value.trim();
      if (!termo) {
        log('warn', 'Busca ignorada: termo vazio.');
        statusEl.textContent = 'Digite um termo para buscar.';
        return;
      }

      searchBtn.disabled = true;
      statusEl.textContent = 'Buscando...';
      resultsEl.innerHTML = '<div class="empty">Carregando...</div>';
      log('info', `Iniciando busca por marcaComercial="${termo}"`);

      const url = `${EMBRAPA_BASE}?marcaComercial=${encodeURIComponent(termo)}`;
      log('info', `GET ${url}`);

      try {
        const resp = await fetch(url, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${EMBRAPA_TOKEN}`,
            'Accept': 'application/json'
          }
        });

        if (!resp.ok) {
          const txt = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${txt}`);
        }

        const data = await resp.json();
        log('ok', 'Resposta recebida da Embrapa.');

        const lista = extrairLista(data);
        log('info', `Total de produtos retornados: ${lista.length}`);

        if (lista.length === 0) {
          resultsEl.innerHTML = '<div class="empty">Nenhum produto encontrado.</div>';
          statusEl.textContent = 'Nenhum produto encontrado.';
          log('warn', 'Lista retornada vazia.');
          return;
        }

        renderResultados(lista);
        statusEl.textContent = `${lista.length} produto(s) encontrado(s). Escolha um para cadastrar.`;
        log('ok', 'Lista exibida para seleção do usuário.');
      } catch (err) {
        log('err', `Erro na busca: ${err.message}`);
        statusEl.textContent = 'Erro na busca. Verifique o log.';
        resultsEl.innerHTML = '<div class="empty">Erro ao buscar produtos.</div>';
      } finally {
        searchBtn.disabled = false;
      }
    }

    function extrairLista(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.data)) return data.data;
      if (data.data && Array.isArray(data.data.produtosFormulados)) return data.data.produtosFormulados;
      if (data.data && Array.isArray(data.data.produtos)) return data.data.produtos;
      if (Array.isArray(data.resultado)) return data.resultado;
      if (Array.isArray(data.results)) return data.results;
      if (data.dados && Array.isArray(data.dados)) return data.dados;
      return [];
    }

    // ===== Renderização =====
    function renderResultados(lista) {
      resultsEl.innerHTML = '';
      lista.forEach((item, idx) => {
        const m = mapearProduto(item);
        const div = document.createElement('div');
        div.className = 'result-item';

        const info = document.createElement('div');
        info.className = 'result-info';
        info.innerHTML = `
          <div class="title">${escapeHtml(m.marca_comercial || '(sem nome)')}</div>
          <div class="meta">
            <span><strong>Ing. Ativo:</strong> ${escapeHtml(m.ingrediente_ativo || '-')}</span>
            <span><strong>Registro:</strong> ${escapeHtml(m.numero_registro || '-')}</span>
          </div>
        `;

        const btn = document.createElement('button');
        btn.className = 'btn-add';
        btn.textContent = 'Adicionar ao Estoque';
        btn.addEventListener('click', () => cadastrarInsumo(m, btn));

        div.appendChild(info);
        div.appendChild(btn);
        resultsEl.appendChild(div);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ===== Persistência Supabase =====
    async function cadastrarInsumo(produto, btn) {
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Salvando...';
      btn.classList.remove('success', 'fail');

      const nome = produto.marca_comercial || '(sem nome)';
      log('info', `Cadastrando "${nome}" na tabela 'insumos'...`);

      const payload = {
        marca_comercial: produto.marca_comercial || null,
        ingrediente_ativo: produto.ingrediente_ativo || null,
        numero_registro: produto.numero_registro || null
      };

      try {
        const { data, error } = await supabase
          .from('insumos')
          .insert([payload])
          .select();

        if (error) {
          throw new Error(error.message);
        }

        log('ok', `"${nome}" salvo com sucesso no Supabase.`);
        btn.textContent = 'Cadastrado ✓';
        btn.classList.add('success');
        statusEl.textContent = `"${nome}" adicionado ao estoque.`;
      } catch (err) {
        log('err', `Falha ao salvar "${nome}" no Supabase: ${err.message}`);
        btn.textContent = 'Erro - Ver Log';
        btn.classList.add('fail');
        statusEl.textContent = `Erro ao cadastrar "${nome}".`;
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = originalText;
          btn.classList.remove('fail');
        }, 2500);
      } finally {
        if (btn.classList.contains('success')) {
          // mantém desabilitado após sucesso
        } else if (!btn.classList.contains('fail')) {
          btn.disabled = false;
          btn.textContent = originalText;
        }
      }
    }
  </script>
</body>
</html>
