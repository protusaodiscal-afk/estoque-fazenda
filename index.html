<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nelcir - Consulta de Insumos Agrofit</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --verde-fazenda: #2f6b2f;
      --verde-claro: #4c9a4c;
      --terra: #8b5a2b;
      --creme: #f7f3e8;
      --sol: #f4c430;
      --erro: #b00020;
      --sucesso: #1b5e20;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(244,196,48,0.15), transparent 40%),
        linear-gradient(180deg, #e8f5e9 0%, #f7f3e8 100%);
      color: #2b2b2b;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, var(--verde-fazenda), var(--verde-claro));
      color: #fff;
      padding: 18px 24px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header .logo {
      font-size: 40px;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    header p {
      margin: 2px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    main {
      max-width: 980px;
      margin: 28px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      border: 1px solid #e0dcc8;
      margin-bottom: 22px;
    }

    .card h2 {
      margin-top: 0;
      color: var(--verde-fazenda);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .campo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      flex: 1;
      min-width: 240px;
      padding: 12px 14px;
      border: 2px solid var(--verde-claro);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--verde-fazenda);
    }

    button {
      background: var(--verde-fazenda);
      color: #fff;
      border: none;
      padding: 12px 22px;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s, transform 0.05s;
      font-weight: 600;
    }

    button:hover { background: var(--verde-claro); }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: wait; }

    .resultado {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .item {
      background: var(--creme);
      border-left: 6px solid var(--verde-claro);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .item strong { color: var(--verde-fazenda); }
    .item .linha { margin: 4px 0; font-size: 14px; }
    .item .badge {
      display: inline-block;
      background: var(--sol);
      color: #3a2a00;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 6px;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
    }
    .status.ok { color: var(--sucesso); }
    .status.erro { color: var(--erro); }
    .status.info { color: var(--terra); }

    .log {
      background: #1e1e1e;
      color: #d6d6d6;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Consolas', monospace;
      font-size: 12.5px;
      max-height: 240px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .log .linha-log { margin: 2px 0; }
    .log .err { color: #ff6b6b; }
    .log .ok { color: #8ae78a; }
    .log .info { color: #ffd166; }

    footer {
      text-align: center;
      color: #555;
      font-size: 12px;
      padding: 18px;
    }

    .empty {
      color: #777;
      font-style: italic;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🌾</div>
    <div>
      <h1>Nelcir - Consulta de Insumos</h1>
      <p>Integração Embrapa Agrofit + Supabase</p>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>🌱 Buscar Produto Formulado</h2>
      <div class="campo">
        <input type="text" id="busca" placeholder="Digite a marca comercial (ex: Roundup)..." />
        <button id="btnBuscar" onclick="buscarInsumo()">🔍 Buscar</button>
      </div>
      <div id="status" class="status"></div>
      <div id="resultado" class="resultado"></div>
    </section>

    <section class="card">
      <h2>🪵 Log de Erros / Eventos</h2>
      <div id="log" class="log"></div>
    </section>
  </main>

  <footer>
    Nelcir © Fazenda Digital — Consulta Agrofit / Supabase
  </footer>

  <script>
    // ===== Credenciais Fixas =====
    const SUPABASE_URL = 'https://fzckjvvdqtyvunwxrbyl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2tqdnZkcXR5dnVud3hyYnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjgxOTgsImV4cCI6MjA5OTAwNDE5OH0.TxS0GJF0egBbkYHvRQN1Kzvid2ysSneG75jJ3RiwXaM';
    const EMBRAPA_TOKEN = '9c9499c1-7595-3271-a8f1-3f4c4cb4aee8';

    // URL Embrapa Corrigida
    const EMBRAPA_URL = 'https://api.cnptia.embrapa.br/agrofit/v1/produtos-formulados';

    // ===== Supabase Client =====
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== Log =====
    const logEl = document.getElementById('log');
    function logEvent(tipo, mensagem) {
      const d = new Date();
      const ts = d.toLocaleString('pt-BR');
      const div = document.createElement('div');
      div.className = 'linha-log ' + (tipo || 'info');
      div.textContent = '[' + ts + '] [' + (tipo || 'info').toUpperCase() + '] ' + mensagem;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
      // Também no console
      if (tipo === 'err') console.error(mensagem);
      else if (tipo === 'ok') console.log(mensagem);
      else console.info(mensagem);
    }

    function setStatus(texto, tipo) {
      const el = document.getElementById('status');
      el.textContent = texto;
      el.className = 'status ' + (tipo || 'info');
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ===== Buscar na Embrapa =====
    async function buscarInsumo() {
      const btn = document.getElementById('btnBuscar');
      const termo = document.getElementById('busca').value.trim();
      const resultadoEl = document.getElementById('resultado');
      resultadoEl.innerHTML = '';

      if (!termo) {
        setStatus('Digite uma marca comercial para buscar.', 'erro');
        logEvent('err', 'Busca vazia: nenhum termo informado.');
        return;
      }

      btn.disabled = true;
      setStatus('Consultando Embrapa Agrofit...', 'info');
      logEvent('info', 'Iniciando busca por marcaComercial="' + termo + '"');

      // Parâmetro de busca: marcaComercial
      const url = EMBRAPA_URL + '?marcaComercial=' + encodeURIComponent(termo);
      logEvent('info', 'GET ' + url);

      try {
        const resp = await fetch(url, {
          method: 'GET',
          headers: {
            'Accept': 'application/json',
            'Authorization': 'Bearer ' + EMBRAPA_TOKEN
          }
        });

        if (!resp.ok) {
          const txt = await resp.text();
          throw new Error('HTTP ' + resp.status + ' - ' + txt);
        }

        const data = await resp.json();
        logEvent('ok', 'Resposta recebida da Embrapa.');

        // Tenta localizar a lista de produtos em formatos comuns
        let lista = [];
        if (Array.isArray(data)) {
          lista = data;
        } else if (data && Array.isArray(data.dados)) {
          lista = data.dados;
        } else if (data && Array.isArray(data.data)) {
          lista = data.data;
        } else if (data && Array.isArray(data.resultado)) {
          lista = data.resultado;
        } else if (data && Array.isArray(data.produtos)) {
          lista = data.produtos;
        } else if (data && data.dados && Array.isArray(data.dados.produtos)) {
          lista = data.dados.produtos;
        }

        if (!lista.length) {
          setStatus('Nenhum produto encontrado para "' + termo + '".', 'erro');
          logEvent('err', 'Nenhum produto retornado pela Embrapa para o termo informado.');
          btn.disabled = false;
          return;
        }

        setStatus(lista.length + ' produto(s) encontrado(s). Salvando no Supabase...', 'info');
        logEvent('info', 'Total de produtos retornados: ' + lista.length);

        for (const item of lista) {
          // Mapeamento de Dados: marcaComercial, ingredienteAtivo, numeroRegistro
          const marcaComercial = item.marcaComercial || item.marca_comercial || '';
          const ingredienteAtivo = item.ingredienteAtivo || item.ingrediente_ativo || '';
          const numeroRegistro = item.numeroRegistro || item.numero_registro || '';

          if (!marcaComercial && !ingredienteAtivo && !numeroRegistro) {
            logEvent('err', 'Item sem campos esperados (marcaComercial/ingredienteAtivo/numeroRegistro). Pulando.');
            continue;
          }

          // Renderiza
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML =
            '<div class="linha"><strong>' + escapeHtml(marcaComercial) + '</strong>' +
            (numeroRegistro ? ' <span class="badge">Reg: ' + escapeHtml(numeroRegistro) + '</span>' : '') + '</div>' +
            '<div class="linha">Ingrediente ativo: ' + escapeHtml(ingredienteAtivo) + '</div>';
          resultadoEl.appendChild(div);

          // Persistência: tabela 'insumos' -> nome, ingrediente_ativo, numero_registro
          try {
            const { error } = await supabaseClient
              .from('insumos')
              .upsert([
                {
                  nome: marcaComercial,
                  ingrediente_ativo: ingredienteAtivo,
                  numero_registro: numeroRegistro
                }
              ], { onConflict: 'numero_registro' });

            if (error) {
              logEvent('err', 'Falha ao salvar "' + marcaComercial + '" no Supabase: ' + error.message);
            } else {
              logEvent('ok', 'Salvo no Supabase (insumos): ' + marcaComercial + ' | ' + ingredienteAtivo + ' | ' + numeroRegistro);
            }
          } catch (e) {
            logEvent('err', 'Exceção ao salvar no Supabase: ' + (e && e.message ? e.message : e));
          }
        }

        setStatus('Processo concluído.', 'ok');
        logEvent('ok', 'Busca e persistência finalizadas.');
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        setStatus('Erro ao consultar Embrapa: ' + msg, 'erro');
        logEvent('err', 'Erro na consulta Embrapa: ' + msg);
      } finally {
        btn.disabled = false;
      }
    }

    // Enter dispara busca
    document.getElementById('busca').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') buscarInsumo();
    });

    logEvent('info', 'Nelcir inicializado. Aguardando busca...');
  </script>
</body>
</html>
