<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroAPI Embrapa - Produtos Formulados</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { margin: 0; padding: 24px; background: #f4f6f8; color: #222; }
    h1 { color: #2e7d32; margin-top: 0; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    input, button { padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    button { cursor: pointer; background: #2e7d32; color: #fff; border: none; }
    button:hover { background: #256628; }
    button:disabled { background: #9bb39b; cursor: not-allowed; }
    .aviso { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: none; }
    .aviso.erro { background: #fdecea; color: #b71c1c; border: 1px solid #f5c6cb; display: block; }
    .aviso.sucesso { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; display: block; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { background: #2e7d32; color: #fff; }
    tr:hover { background: #f9fbf9; }
    .carregando { color: #666; font-style: italic; }
    .selecionar { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <h1>AgroAPI Embrapa - Produtos Formulados</h1>

  <div id="aviso" class="aviso"></div>

  <div class="toolbar">
    <input type="text" id="busca" placeholder="Buscar por marca comercial..." />
    <button id="btnBuscar">Buscar</button>
    <button id="btnSalvar">Salvar Selecionados (Supabase)</button>
  </div>

  <div id="status" class="carregando"></div>

  <table id="tabela">
    <thead>
      <tr>
        <th></th>
        <th>Marca Comercial</th>
        <th>Ingrediente Ativo</th>
        <th>Número de Registro</th>
      </tr>
    </thead>
    <tbody id="corpoTabela"></tbody>
  </table>

  <script>
    // ===== Configurações =====

    // Token da AgroAPI da Embrapa (Agrofit v1)
    // Substitua pelo seu token válido obtido em https://api.cnptia.embrapa.br
    const AGROAPI_TOKEN = "9c9499c1-7595-3271-a8f1-3f4c4cb4aee8";

    // Configurações do Supabase
    const SUPABASE_URL = "https://fzckjvvdqtyvunwxrbyl.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2tqdnZkcXR5dnVud3hyYnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjgxOTgsImV4cCI6MjA5OTAwNDE5OH0.TxS0GJF0egBbkYHvRQN1Kzvid2ysSneG75jJ3RiwXaM";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== Elementos =====
    const avisoEl = document.getElementById("aviso");
    const statusEl = document.getElementById("status");
    const corpoTabela = document.getElementById("corpoTabela");
    const inputBusca = document.getElementById("busca");

    let produtosCache = [];

    // ===== Utilitários =====
    function mostrarAviso(mensagem, tipo = "erro") {
      avisoEl.textContent = mensagem;
      avisoEl.className = "aviso " + tipo;
    }

    function limparAviso() {
      avisoEl.textContent = "";
      avisoEl.className = "aviso";
    }

    // ===== Buscar produtos na AgroAPI da Embrapa =====
    async function buscarProdutos(termo = "") {
      limparAviso();
      corpoTabela.innerHTML = "";
      statusEl.textContent = "Carregando produtos da AgroAPI...";

      if (!AGROAPI_TOKEN || AGROAPI_TOKEN === "9c9499c1-7595-3271-a8f1-3f4c4cb4aee8") {
        statusEl.textContent = "";
        mostrarAviso("Token da AgroAPI não configurado. Defina AGROAPI_TOKEN com um token válido.", "erro");
        return;
      }

      const url = new URL("https://api.cnptia.embrapa.br/agrofit/v1/produtos-formulados");
      if (termo) {
        url.searchParams.append("marcaComercial", termo);
      }

      try {
        const resposta = await fetch(url.toString(), {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + AGROAPI_TOKEN,
            "Accept": "application/json"
          }
        });

        if (resposta.status === 401 || resposta.status === 403) {
          statusEl.textContent = "";
          mostrarAviso("Token da AgroAPI inválido ou não autorizado. Verifique seu AGROAPI_TOKEN.", "erro");
          return;
        }

        if (!resposta.ok) {
          statusEl.textContent = "";
          mostrarAviso("Falha ao consultar a AgroAPI (HTTP " + resposta.status + "). Tente novamente mais tarde.", "erro");
          return;
        }

        const dados = await resposta.json();

        // A API pode retornar os itens em "data", "produtos" ou direto como array.
        const lista = Array.isArray(dados) ? dados
          : (dados.data || dados.produtos || dados.resultado || []);

        produtosCache = lista.map(function (item) {
          return {
            marcaComercial: item.marcaComercial || "",
            ingredienteAtivo: item.ingredienteAtivo || "",
            numeroRegistro: item.numeroRegistro || ""
          };
        });

        renderizarTabela(produtosCache);
        statusEl.textContent = produtosCache.length + " produto(s) encontrado(s).";
      } catch (erro) {
        statusEl.textContent = "";
        mostrarAviso("Erro ao conectar à AgroAPI da Embrapa: " + erro.message, "erro");
      }
    }

    // ===== Renderizar tabela =====
    function renderizarTabela(produtos) {
      corpoTabela.innerHTML = "";
      produtos.forEach(function (produto, indice) {
        const tr = document.createElement("tr");

        const tdCheck = document.createElement("td");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "selecionar";
        checkbox.dataset.indice = indice;
        tdCheck.appendChild(checkbox);

        const tdMarca = document.createElement("td");
        tdMarca.textContent = produto.marcaComercial;

        const tdIngrediente = document.createElement("td");
        tdIngrediente.textContent = produto.ingredienteAtivo;

        const tdRegistro = document.createElement("td");
        tdRegistro.textContent = produto.numeroRegistro;

        tr.appendChild(tdCheck);
        tr.appendChild(tdMarca);
        tr.appendChild(tdIngrediente);
        tr.appendChild(tdRegistro);

        corpoTabela.appendChild(tr);
      });
    }

    // ===== Salvar selecionados no Supabase =====
    async function salvarSelecionados() {
      limparAviso();
      const selecionados = Array.from(document.querySelectorAll(".selecionar:checked"))
        .map(function (checkbox) {
          return produtosCache[parseInt(checkbox.dataset.indice, 10)];
        })
        .filter(function (p) { return p !== undefined; });

      if (selecionados.length === 0) {
        mostrarAviso("Selecione ao menos um produto para salvar.", "erro");
        return;
      }

      try {
        const registros = selecionados.map(function (p) {
          return {
            marca_comercial: p.marcaComercial,
            ingrediente_ativo: p.ingredienteAtivo,
            numero_registro: p.numeroRegistro
          };
        });

        const { error } = await supabaseClient
          .from("produtos")
          .insert(registros);

        if (error) {
          mostrarAviso("Erro ao salvar no Supabase: " + error.message, "erro");
          return;
        }

        mostrarAviso(selecionados.length + " produto(s) salvo(s) no Supabase com sucesso!", "sucesso");
      } catch (erro) {
        mostrarAviso("Erro inesperado ao salvar no Supabase: " + erro.message, "erro");
      }
    }

    // ===== Eventos =====
    document.getElementById("btnBuscar").addEventListener("click", function () {
      buscarProdutos(inputBusca.value.trim());
    });

    inputBusca.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        buscarProdutos(inputBusca.value.trim());
      }
    });

    document.getElementById("btnSalvar").addEventListener("click", salvarSelecionados);

    // ===== Inicialização =====
    buscarProdutos();
  </script>
</body>
</html>
