<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelcir - Gestão de Insumos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-md mb-6">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <span class="text-xl font-bold text-blue-600">Nelcir Agro</span>
                <div class="flex space-x-4">
                    <button onclick="showTab('dashboard')" class="tab-btn px-3 py-2 font-medium active" id="btn-dashboard">Dashboard</button>
                    <button onclick="showTab('importar')" class="tab-btn px-3 py-2 font-medium" id="btn-importar">Importar</button>
                    <button onclick="showTab('salvos')" class="tab-btn px-3 py-2 font-medium" id="btn-salvos">Salvos</button>
                    <button onclick="showTab('log')" class="tab-btn px-3 py-2 font-medium" id="btn-log">Log</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        
        <!-- ABA: DASHBOARD -->
        <div id="dashboard" class="tab-content active">
            <h2 class="text-2xl font-bold mb-4">Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-lg shadow">
                    <p class="text-gray-500">Total de Insumos</p>
                    <p id="stat-total" class="text-3xl font-bold">0</p>
                </div>
            </div>
        </div>

        <!-- ABA: IMPORTAR -->
        <div id="importar" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Importar da Embrapa</h2>
            <div class="bg-white p-6 rounded-lg shadow mb-6">
                <div class="flex gap-2">
                    <input type="text" id="search-input" placeholder="Nome comercial (ex: Roundup)" class="flex-1 border p-2 rounded">
                    <button onclick="searchEmbrapa()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Buscar</button>
                </div>
            </div>
            <div id="search-results" class="grid gap-4"></div>
        </div>

        <!-- ABA: SALVOS -->
        <div id="salvos" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">Insumos Salvos</h2>
                <button onclick="loadSaved()" class="text-blue-600 text-sm">Atualizar</button>
            </div>
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">Nome</th>
                            <th class="p-4">Ingrediente Ativo</th>
                            <th class="p-4">Nº Registro</th>
                        </tr>
                    </thead>
                    <tbody id="saved-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- ABA: LOG -->
        <div id="log" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">Log de Atividades</h2>
            <div id="log-container" class="bg-black text-green-400 p-4 rounded font-mono text-sm h-96 overflow-y-auto"></div>
        </div>

    </main>

    <script>
        // CONFIGURAÇÕES
        const SUPABASE_URL = "https://fzckjvvdqtyvunwxrbyl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2tqdnZkcXR5dnVud3hyYnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjgxOTgsImV4cCI6MjA5OTAwNDE5OH0.TxS0GJF0egBbkYHvRQN1Kzvid2ysSneG75jJ3RiwXaM";
        const EMBRAPA_TOKEN = "9c9499c1-7595-3271-a8f1-3f4c4cb4aee8";
        const PROXY = "https://api.allorigins.win/raw?url=";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. NAVEGAÇÃO SIMPLES
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            if(tabId === 'salvos') loadSaved();
            if(tabId === 'dashboard') updateStats();
        }

        function addLog(msg) {
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString();
            container.innerHTML += `<div>[${time}] ${msg}</div>`;
            container.scrollTop = container.scrollHeight;
        }

        // 2. BUSCA EMBRAPA (COM PROXY)
        async function searchEmbrapa() {
            const query = document.getElementById('search-input').value;
            if (!query) return alert("Digite um nome");

            addLog(`Iniciando busca por: ${query}`);
            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = "<p class='text-center'>Buscando...</p>";

            const targetUrl = `https://api.cnptia.embrapa.br/agrofit/v1/produtos-formulados?marcaComercial=${encodeURIComponent(query)}`;
            const fullUrl = `${PROXY}${encodeURIComponent(targetUrl)}`;

            try {
                const response = await fetch(fullUrl, {
                    headers: { 'Authorization': `Bearer ${EMBRAPA_TOKEN}`, 'Accept': 'application/json' }
                });
                const data = await response.json();
                
                resultsDiv.innerHTML = "";
                const items = data.data || [];

                if (items.length === 0) {
                    resultsDiv.innerHTML = "<p class='text-gray-500'>Nenhum resultado encontrado.</p>";
                    return;
                }

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded shadow flex justify-between items-center";
                    card.innerHTML = `
                        <div>
                            <p class="font-bold">${item.marcaComercial}</p>
                            <p class="text-sm text-gray-600">${item.ingredienteAtivo || 'N/A'}</p>
                            <p class="text-xs text-gray-400">Registro: ${item.numeroRegistro}</p>
                        </div>
                        <button onclick="saveToSupabase('${item.marcaComercial}', '${item.ingredienteAtivo}', '${item.numeroRegistro}')" 
                                class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">
                            Salvar
                        </button>
                    `;
                    resultsDiv.appendChild(card);
                });
                addLog(`Busca concluída. ${items.length} itens encontrados.`);
            } catch (err) {
                addLog(`Erro na busca: ${err.message}`);
                resultsDiv.innerHTML = `<p class="text-red-500">Erro ao carregar dados da Embrapa.</p>`;
            }
        }

        // 3. SALVAR NO SUPABASE
        async function saveToSupabase(nome, ingrediente, registro) {
            addLog(`Tentando salvar: ${nome}`);
            try {
                const { data, error } = await supabase
                    .from('insumos')
                    .insert([
                        { 
                            nome: nome, 
                            ingrediente_ativo: ingrediente, 
                            numero_registro: registro 
                        }
                    ]);

                if (error) throw error;
                
                addLog(`Sucesso: ${nome} salvo no banco.`);
                alert("Salvo com sucesso!");
            } catch (err) {
                addLog(`Erro ao salvar: ${err.message}`);
                alert("Erro ao salvar no banco de dados.");
            }
        }

        // 4. CARREGAR SALVOS
        async function loadSaved() {
            const tbody = document.getElementById('saved-table-body');
            tbody.innerHTML = "<tr><td colspan='3' class='p-4 text-center'>Carregando...</td></tr>";

            try {
                const { data, error } = await supabase
                    .from('insumos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                tbody.innerHTML = "";
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="p-4 font-medium">${row.nome}</td>
                            <td class="p-4 text-gray-600">${row.ingrediente_ativo || '-'}</td>
                            <td class="p-4 text-gray-500">${row.numero_registro || '-'}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                addLog(`Erro ao carregar salvos: ${err.message}`);
                tbody.innerHTML = "<tr><td colspan='3' class='p-4 text-red-500'>Erro ao carregar dados.</td></tr>";
            }
        }

        async function updateStats() {
            const { count, error } = await supabase
                .from('insumos')
                .select('*', { count: 'exact', head: true });
            
            if (!error) {
                document.getElementById('stat-total').innerText = count || 0;
            }
        }

        // Inicialização
        window.onload = () => {
            addLog("Sistema iniciado.");
            updateStats();
        };
    </script>
</body>
</html>
