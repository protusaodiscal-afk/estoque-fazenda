<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Insumos</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      padding: 24px;
      color: #1f2937;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: #ffffff;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 2rem;
      letter-spacing: 0.5px;
    }

    header p {
      opacity: 0.85;
      margin-top: 6px;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
    }

    .card h2 {
      margin-bottom: 16px;
      color: #1e3c72;
      font-size: 1.25rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #374151;
      font-weight: 600;
    }

    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus {
      border-color: #2a5298;
      box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.2);
    }

    button {
      cursor: pointer;
      border: none;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      transition: transform 0.05s, opacity 0.2s;
    }

    button:hover {
      opacity: 0.92;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
    }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .search-row input {
      flex: 1;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #f9fafb;
    }

    .item-info strong {
      color: #1e3c72;
    }

    .item-info span {
      display: block;
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 2px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .item-actions button {
      width: auto;
      padding: 6px 12px;
      font-size: 0.85rem;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 24px;
      font-style: italic;
    }

    .bula {
      margin-top: 14px;
      padding: 14px 16px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      color: #1e3c72;
      font-size: 0.92rem;
      line-height: 1.5;
      display: none;
    }

    .bula.visible {
      display: block;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e3c72;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Gestão de Insumos</h1>
      <p>Cadastro e consulta de insumos conectado ao Supabase</p>
    </header>

    <section class="card">
      <h2>Adicionar Insumo</h2>
      <form id="form-insumo">
        <div class="form-grid">
          <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome" required placeholder="Ex.: Dipirona" />
          </div>
          <div>
            <label for="quantidade">Quantidade</label>
            <input type="number" id="quantidade" min="0" required placeholder="Ex.: 50" />
          </div>
          <div>
            <label for="unidade">Unidade</label>
            <select id="unidade">
              <option value="comprimido">comprimido</option>
              <option value="ml">ml</option>
              <option value="mg">mg</option>
              <option value="ampola">ampola</option>
              <option value="unidade">unidade</option>
            </select>
          </div>
          <div>
            <label for="validade">Validade</label>
            <input type="date" id="validade" />
          </div>
          <div class="actions">
            <button type="submit">Salvar Insumo</button>
            <button type="reset" class="btn-secondary">Limpar</button>
          </div>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Buscar Bula (Simulação)</h2>
      <div class="search-row">
        <input type="text" id="busca-bula" placeholder="Digite o nome do medicamento..." />
        <button type="button" id="btn-buscar-bula">Buscar Bula</button>
      </div>
      <div id="bula-resultado" class="bula"></div>
    </section>

    <section class="card">
      <h2>Insumos Cadastrados</h2>
      <div class="search-row">
        <input type="text" id="busca-insumo" placeholder="Filtrar por nome..." />
        <button type="button" id="btn-atualizar" class="btn-secondary">Atualizar Lista</button>
      </div>
      <div id="lista-insumos" class="list">
        <div class="empty">Carregando insumos...</div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Supabase JS SDK via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ============================================================
    // CONFIGURAÇÃO DO SUPABASE
    // Preencha os valores abaixo com as credenciais do seu projeto.
    // ============================================================
    const SUPABASE_URL = 'https://fzckjvvdqtyvunwxrbyl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2tqdnZkcXR5dnVud3hyYnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MjgxOTgsImV4cCI6MjA5OTAwNDE5OH0.TxS0GJF0egBbkYHvRQN1Kzvid2ysSneG75jJ3RiwXaM';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ============================================================
    // ELEMENTOS DA DOM
    // ============================================================
    const formInsumo = document.getElementById('form-insumo');
    const listaInsumos = document.getElementById('lista-insumos');
    const buscaInsumo = document.getElementById('busca-insumo');
    const btnAtualizar = document.getElementById('btn-atualizar');
    const buscaBula = document.getElementById('busca-bula');
    const btnBuscarBula = document.getElementById('btn-buscar-bula');
    const bulaResultado = document.getElementById('bula-resultado');
    const toast = document.getElementById('toast');

    let insumosCache = [];

    // ============================================================
    // UTILITÁRIOS
    // ============================================================
    function showToast(message, isError = false) {
      toast.textContent = message;
      toast.classList.toggle('error', isError);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function formatarData(data) {
      if (!data) return '—';
      const d = new Date(data);
      return d.toLocaleDateString('pt-BR');
    }

    // ============================================================
    // SUPABASE: CARREGAR INSUMOS
    // ============================================================
    async function carregarInsumos() {
      try {
        const { data, error } = await supabase.from('insumos').select('*');
        if (error) throw error;

        insumosCache = data || [];
        renderizarInsumos();
      } catch (err) {
        console.error('Erro ao carregar insumos:', err);
        showToast('Erro ao carregar insumos do banco.', true);
        listaInsumos.innerHTML = '<div class="empty">Erro ao carregar insumos.</div>';
      }
    }

    // ============================================================
    // SUPABASE: SALVAR INSUMO
    // ============================================================
    async function salvarInsumo(event) {
      event.preventDefault();

      const novoInsumo = {
        nome: document.getElementById('nome').value.trim(),
        quantidade: parseInt(document.getElementById('quantidade').value, 10),
        unidade: document.getElementById('unidade').value,
        validade: document.getElementById('validade').value || null
      };

      if (!novoInsumo.nome) {
        showToast('Informe o nome do insumo.', true);
        return;
      }

      try {
        const { data, error } = await supabase.from('insumos').insert([novoInsumo]).select();
        if (error) throw error;

        if (data && data.length) {
          insumosCache.push(data[0]);
        }
        renderizarInsumos();
        formInsumo.reset();
        showToast('Insumo salvo com sucesso!');
      } catch (err) {
        console.error('Erro ao salvar insumo:', err);
        showToast('Erro ao salvar insumo no banco.', true);
      }
    }

    // ============================================================
    // RENDERIZAÇÃO
    // ============================================================
    function renderizarInsumos() {
      const filtro = buscaInsumo.value.trim().toLowerCase();
      const lista = filtro
        ? insumosCache.filter(i => (i.nome || '').toLowerCase().includes(filtro))
        : insumosCache;

      if (!lista.length) {
        listaInsumos.innerHTML = '<div class="empty">Nenhum insumo cadastrado.</div>';
        return;
      }

      listaInsumos.innerHTML = lista.map(insumo => `
        <div class="item">
          <div class="item-info">
            <strong>${insumo.nome}</strong>
            <span>Quantidade: ${insumo.quantidade} ${insumo.unidade || ''} • Validade: ${formatarData(insumo.validade)}</span>
          </div>
          <div class="item-actions">
            <button type="button" onclick="buscarBulaPorNome('${insumo.nome.replace(/'/g, "\\'")}')">Ver Bula</button>
          </div>
        </div>
      `).join('');
    }

    // ============================================================
    // SIMULAÇÃO DE BUSCA DE BULA
    // ============================================================
    function simularBula(nome) {
      const bulas = {
        dipirona: 'Dipirona: analgésico e antitérmico. Posologia: 500mg a 1000mg, de 6 em 6 horas. Contraindicações: gravidez e discrasias sanguíneas.',
        paracetamol: 'Paracetamol: analgésico e antitérmico. Posologia: 500mg a 750mg, de 4 em 4 horas. Contraindicações: insuficiência hepática.',
        ibuprofeno: 'Ibuprofeno: anti-inflamatório não esteroide. Posologia: 400mg a 600mg, de 8 em 8 horas. Contraindicações: úlcera péptica.',
        amoxicilina: 'Amoxicilina: antibiótico penicilínico. Posologia: 500mg, de 8 em 8 horas. Contraindicações: alergia a penicilina.'
      };

      const chave = (nome || '').toLowerCase().trim();
      const bula = bulas[chave];

      if (bula) {
        return bula;
      }

      return `Bula não encontrada para "${nome}". (Simulação) — Consulte um profissional de saúde ou a base oficial da ANVISA para mais informações.`;
    }

    function exibirBula(nome) {
      const texto = simularBula(nome);
      bulaResultado.textContent = texto;
      bulaResultado.classList.add('visible');
    }

    function buscarBulaPorNome(nome) {
      buscaBula.value = nome;
      exibirBula(nome);
    }

    // ============================================================
    // EVENTOS
    // ============================================================
    formInsumo.addEventListener('submit', salvarInsumo);
    buscaInsumo.addEventListener('input', renderizarInsumos);
    btnAtualizar.addEventListener('click', carregarInsumos);
    btnBuscarBula.addEventListener('click', () => exibirBula(buscaBula.value));
    buscaBula.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') exibirBula(buscaBula.value);
    });

    // ============================================================
    // INICIALIZAÇÃO
    // ============================================================
    window.buscarBulaPorNome = buscarBulaPorNome;
    document.addEventListener('DOMContentLoaded', carregarInsumos);
  </script>
</body>
</html>
